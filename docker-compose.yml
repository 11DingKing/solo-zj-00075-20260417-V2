version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: stackoverflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: stackoverflow-clone
    volumes:
      - mongodb_data:/data/db
    networks:
      - stackoverflow-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stackoverflow-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=mongodb://mongodb:27017/stackoverflow-clone
      - JWT_SECRET=${JWT_SECRET:-production_secret_key}
    depends_on:
      - mongodb
    networks:
      - stackoverflow-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080/api}
        - NEXT_PUBLIC_SITE_NAME=${SITE_NAME:-localhost:3000}
        - API_URL=${API_URL:-http://localhost:8080/api}
        - SITE_NAME=${SITE_NAME:-localhost:3000}
    container_name: stackoverflow-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SITE_NAME=${SITE_NAME:-localhost:3000}
      - API_URL=${API_URL:-http://localhost:8080/api}
      - NEXT_PUBLIC_SITE_NAME=${SITE_NAME:-localhost:3000}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080/api}
    depends_on:
      - server
    networks:
      - stackoverflow-network

networks:
  stackoverflow-network:
    driver: bridge

volumes:
  mongodb_data:
